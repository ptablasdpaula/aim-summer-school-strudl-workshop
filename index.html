<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live-coding workshop</title>
<script src="config.js"></script>
<script src="vendor-hydra.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin:0; padding:2.4rem 1.2rem 4rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background:#0e0e12; color:#e8e8ef;
    background-image: radial-gradient(circle at 50% -10%, #1d1d2e 0%, #0e0e12 55%);
  }
  /* Live Hydra visuals behind everything, with a scrim so text stays readable. */
  #bg { position:fixed; inset:0; width:100vw; height:100vh; z-index:-2;
        pointer-events:none; opacity:.55; }
  #bgscrim { position:fixed; inset:0; z-index:-1; pointer-events:none;
    background: radial-gradient(circle at 50% 30%, rgba(14,14,18,.45) 0%, rgba(14,14,18,.72) 70%, rgba(14,14,18,.9) 100%); }
  .wrap { max-width: 60rem; margin: 0 auto; position:relative; z-index:1; }
  h1 { font-size: 2rem; margin:.2rem 0; letter-spacing:-.02em; }
  .sub { color:#a9a9c2; margin-top:.2rem; }
  h2 { font-size:1.1rem; margin:2.4rem 0 1rem; color:#cfcfe6;
       border-bottom:1px solid #26263a; padding-bottom:.5rem; }
  .toprow { margin-top:1.4rem; }
  .grid { display:grid; gap:1rem; grid-template-columns: repeat(auto-fit, minmax(15rem,1fr)); }
  .card { background:#16161f; border:1px solid #26263a; border-radius:14px; padding:1rem 1rem 1.1rem; }
  .card h3 { margin:.1rem 0 .6rem; font-size:1rem; color:#fff; }
  pre { margin:0 0 .8rem; padding:.7rem .8rem; background:#0c0c13; border:1px solid #232335;
        border-radius:9px; font-size:.78rem; line-height:1.45; color:#bdbdf0; overflow:auto; max-height:8.5rem; }
  .row { display:flex; gap:.5rem; flex-wrap:wrap; }
  a.btn, button.btn {
    display:inline-flex; align-items:center; gap:.4rem; cursor:pointer;
    font:inherit; font-size:.82rem; text-decoration:none;
    padding:.5rem .8rem; border-radius:9px; border:1px solid #3a3a5c;
    background:#23233a; color:#e8e8ef;
  }
  a.btn.play { background:#7c5cff; border-color:#7c5cff; color:#fff; font-weight:600; }
  button.btn:hover, a.btn:hover { filter:brightness(1.15); }
  /* Shared big banner used by both Slides and Join the jam. */
  .banner {
    margin-top:1rem; border-radius:16px; padding:1.6rem; display:flex;
    flex-wrap:wrap; align-items:center; justify-content:space-between; gap:1rem;
    text-decoration:none;
  }
  .banner:hover { filter:brightness(1.08); }
  .banner h3 { margin:0; font-size:1.25rem; color:#fff; }
  .banner .pill {
    background:#fff; font-weight:700; padding:.85rem 1.4rem;
    border-radius:11px; white-space:nowrap; font-size:1rem;
  }
  .jam { background:linear-gradient(135deg,#7c5cff,#4a8cff); }      /* purple -> blue */
  .jam .pill { color:#3322aa; }
  .slides-banner { background:linear-gradient(135deg,#4a8cff,#7c5cff); }  /* blue -> purple (inverted) */
  .slides-banner .pill { color:#1f3a8a; }
  code.inline { color:#9b8bff; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="bgscrim"></div>
<div class="wrap">
  <h1>Summer School Live-Coding Workshop!!!</h1>
  <p class="sub" id="tagline"></p>

  <div class="toprow" id="toprow"></div>

  <h2>Basics:</h2>
  <p class="sub" style="margin-top:-.4rem">Open one, press <code class="inline">Ctrl/Cmd + Enter</code> to play,
     <code class="inline">Ctrl/Cmd + .</code> to stop.</p>
  <div class="grid" id="patterns"></div>

  <div class="banner jam">
    <h3>Join the Jam!</h3>
    <a class="pill" href="join.html">Join &rarr;</a>
  </div>
</div>

<script>
  var W = window.WORKSHOP;

  // Pick a random tagline on each load.
  var TAGLINES = [
    "Give us access to the performer's mind, to the whole human instrument.",
    "Obscurantism is dangerous. Show us your screens.",
    "Programs are instruments that can change themselves.",
    "The program is to be transcended - Artificial language is the way.",
    "Code should be seen as well as heard, underlying algorithms viewed as well as their visual outcome.",
    "Live coding is not about tools. Algorithms are thoughts. Chainsaws are tools. That's why algorithms are sometimes harder to notice than chainsaws.",
  ];
  document.getElementById("tagline").textContent =
    TAGLINES[Math.floor(Math.random() * TAGLINES.length)];

  function renderHub(data) {
    var patterns = (data && data.patterns && data.patterns.length)
      ? data.patterns : W.STRUDEL_PATTERNS;

    // Top row: Slides link (only if one has been published).
    var top = document.getElementById("toprow");
    top.innerHTML = "";
    if (data && data.slides) {
      var slides = document.createElement("a");
      slides.className = "banner slides-banner";
      slides.href = data.slides;
      slides.target = "_blank";
      slides.rel = "noopener";
      slides.innerHTML = '<h3>Slides</h3><span class="pill">Open &rarr;</span>';
      top.appendChild(slides);
    }

    // Warm-up pattern cards: #1, #2, ... each opens its strudel.cc link.
    var grid = document.getElementById("patterns");
    grid.innerHTML = "";
    patterns.forEach(function (p, i) {
      var link = W.strudelLink(p.code);
      var card = document.createElement("div");
      card.className = "card";
      var title = document.createElement("h3");
      title.textContent = "#" + (i + 1) + (p.title ? "  " + p.title : "");
      var pre = document.createElement("pre");
      pre.textContent = p.code;
      var rowEl = document.createElement("div");
      rowEl.className = "row";
      var open = document.createElement("a");
      open.className = "btn play"; open.href = link; open.target = "_blank"; open.rel = "noopener";
      open.textContent = "Open";
      rowEl.appendChild(open);
      card.appendChild(title); card.appendChild(pre); card.appendChild(rowEl);
      grid.appendChild(card);
    });
  }

  // Load the shared, organiser-published data (slides + patterns). Fall back
  // to the defaults baked into config.js if it can't be fetched.
  fetch(W.DATA_PATH + "?t=" + Date.now(), { cache: "no-store" })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(renderHub)
    .catch(function () { renderHub(null); });

  // Live Hydra background: run a random gallery sketch on the #bg canvas.
  // Uses makeGlobal so the gallery code (osc/voronoi/o0/render/...) just works.
  // Gracefully no-ops if Hydra is unavailable or the user prefers reduced motion.
  (function startBackground() {
    var canvas = document.getElementById("bg");
    if (!window.Hydra || !canvas) return;
    if (window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    try {
      var hydra = new Hydra({
        canvas: canvas, detectAudio: false, makeGlobal: true, enableStreamCapture: false,
        width: window.innerWidth, height: window.innerHeight,
      });
      // Exclude sketches that pull from a webcam/image/etc (they'd prompt for
      // camera access behind the page); they're still used for jam rooms.
      var sketches = ((W && W.HYDRA_SKETCHES) || []).filter(function (s) {
        return s.indexOf("init") === -1;
      });
      var code = sketches.length
        ? sketches[Math.floor(Math.random() * sketches.length)]
        : "osc(10,0.1,0.9).rotate(0.1).out()";
      (0, eval)(code);
      var t;
      window.addEventListener("resize", function () {
        clearTimeout(t);
        t = setTimeout(function () {
          if (hydra && hydra.setResolution) hydra.setResolution(window.innerWidth, window.innerHeight);
        }, 200);
      });
    } catch (e) {
      canvas.style.display = "none"; // fall back to the plain gradient
    }
  })();
</script>
</body>
</html>
